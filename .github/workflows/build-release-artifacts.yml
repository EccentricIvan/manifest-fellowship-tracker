name: Build Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'

      - run: flutter pub get

      - run: flutter build apk --release --split-per-abi --target-platform android-arm64

      - name: Package release artifacts
        run: |
          cd build/app/outputs/flutter-apk
          cp app-arm64-v8a-release.apk manifest-fellowship-tracker-latest.apk
          zip manifest-fellowship-tracker-latest-apk.zip manifest-fellowship-tracker-latest.apk

      - name: Publish rolling release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-build
          name: Latest Build
          allowUpdates: true
          removeArtifacts: true
          artifacts: "build/app/outputs/flutter-apk/manifest-fellowship-tracker-latest.apk,build/app/outputs/flutter-apk/manifest-fellowship-tracker-latest-apk.zip"
          body: "Automated build from the latest main branch commit."
